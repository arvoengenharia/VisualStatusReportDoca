<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Relatório Visual da Obra</title>
  <link rel="stylesheet" href="style.css" />

  <!-- CryptoJS para o hash da senha (mesma lib que você já usava) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
  <!-- Tela de login -->
  <div id="loginPage" class="login-overlay">
    <div class="login-card">
      <div class="login-logos">
        <img src="logos/arvo.png" alt="Arvo Engenharia" />
        <img src="logos/cliente.png" alt="Cliente" />
      </div>
      <div class="login-title">Relatório Visual da Obra</div>
      <form id="loginForm">
        <div class="login-input-wrap">
          <span class="login-lock">🔒</span>
          <input
            id="senhaInput"
            type="password"
            placeholder="Senha"
            autocomplete="off"
          />
        </div>
        <button type="submit" class="login-btn">Entrar</button>
        <div id="loginError" class="login-error"></div>
      </form>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <div id="appContent" class="app" style="display:none;">
    <!-- Menu lateral -->
    <div class="menu">
      <div class="logos">
        <img src="logos/arvo.png" alt="Arvo Engenharia" />
        <img src="logos/cliente.png" alt="Cliente" />
      </div>
      <h1>SETOR</h1>
      <div id="setoresContainer"></div>
    </div>

    <!-- Área de imagem e navegação -->
    <div class="content">
      <div class="report-header">
        <div class="report-title">Relatório Visual da Obra</div>
        <div class="report-date">
          <!-- você pode preencher a data via JS se quiser -->
        </div>
      </div>

      <div class="image-container">
        <img id="setorImagem" src="" alt="Imagem do setor" />
      </div>

      <div id="navButtons">
        <button type="button" onclick="navegarImagem(-1)">Semana Anterior</button>
        <button type="button" onclick="navegarImagem(1)">Próxima Semana</button>
      </div>

      <div id="legendaImagem" class="legenda"></div>

      <div class="pontos-area">
        <h2 id="tituloPontos" style="display:none;">Pontos de Registro</h2>
        <div id="pontosContainer" class="pontos"></div>
      </div>
    </div>
  </div>

  <!-- Definição de setores/pontos (ajuste conforme seu projeto) -->
  <script id="setores-json" type="application/json">
    {
      "Doca Geral": 6,
      "Outro Setor": 4
    }
  </script>

  <!-- Seu script principal -->
  <script src="script.js"></script>
</body>
</html>
